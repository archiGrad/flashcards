<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>bowl</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#171512">
<style>
:root{--ink:#26221b;--chrome:#171512;--muted:#8d8578}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--chrome);font-family:system-ui,-apple-system,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
img{-webkit-user-drag:none;pointer-events:none}
#grid{display:flex;width:300vw;height:100%;transition:transform .3s cubic-bezier(.25,.8,.3,1)}
.pane{width:100vw;height:100%;position:relative;flex-shrink:0}
#practicepane{background:var(--chrome);display:grid;place-items:center}
#card{width:calc(100vw - 40px);height:calc(100% - 80px);max-width:920px;position:relative}
#card img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(0,0,0,.45)) drop-shadow(0 14px 30px rgba(0,0,0,.4))}
#card #lvldot{inset:auto;top:7%;left:7%;width:26px;height:26px;filter:none}
#empty{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);font-size:14px;line-height:1.7;text-align:center}
#holdmenu{position:fixed;z-index:20;display:none;flex-direction:column;background:rgba(20,18,15,.92);color:#eee;font-size:13px;letter-spacing:.2em;text-transform:uppercase}
#holdmenu span{padding:12px 18px;cursor:pointer;white-space:nowrap}
#holdmenu span:active{color:#fff;background:rgba(255,255,255,.08)}
#holdmenu .sep{height:1px;background:rgba(255,255,255,.12);padding:0}
#editpane{background:#100e0c}
#editwrap{position:absolute;inset:0}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#miniprev{position:absolute;top:calc(8px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);height:13vh;max-height:110px;z-index:8;pointer-events:auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
#trbar{position:absolute;bottom:calc(58px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:8;background:rgba(20,18,15,.75);padding:6px 10px;max-width:92vw}
#trdir{color:#eee;font-size:12px;letter-spacing:.1em;cursor:pointer;white-space:nowrap}
#trq{background:none;border:none;border-bottom:1px solid #555;outline:none;color:#eee;font-size:14px;width:110px;user-select:text;-webkit-user-select:text;touch-action:auto}
#trres{color:#f2d51e;font-size:14px;max-width:36vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#tools{position:absolute;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:8;align-items:center}
.dot{width:30px;height:30px;border-radius:50%;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.3);opacity:.4;transition:opacity .15s,transform .15s;color:#f0eadd;display:grid;place-items:center;font-size:15px}
.dot.on{opacity:1;transform:scale(1.12)}
#cdot{background:var(--ink)}
#cdot input{position:absolute;inset:0;opacity:0;width:100%;height:100%}
#pdot,#mdot,#edot,#tdot{background:none;box-shadow:none}
#pdot::after{content:"";position:absolute;inset:13px 4px;background:currentColor;border-radius:2px;transform:rotate(-45deg)}
#mdot::after{content:"";position:absolute;inset:9px 3px;background:currentColor;opacity:.5;border-radius:3px;transform:rotate(-45deg)}
#edot::after{content:"";position:absolute;inset:7px;border:2px solid currentColor;border-radius:50%}
#tbox{display:none;position:absolute;z-index:10;border:1px dashed rgba(0,0,0,.5)}
#tbox textarea{width:100%;height:100%;background:none;border:none;outline:none;font:18px/1.2 Arial,sans-serif;padding:4px;resize:none;color:inherit;user-select:text;-webkit-user-select:text;touch-action:auto;overflow:hidden}
#tbox i{position:absolute;width:18px;height:18px;background:rgba(0,0,0,.35);touch-action:none}
#tbox i[data-c=nw]{left:-9px;top:-9px}
#tbox i[data-c=ne]{right:-9px;top:-9px}
#tbox i[data-c=sw]{left:-9px;bottom:-9px}
#tbox i[data-c=se]{right:-9px;bottom:-9px}
#tbox b{position:absolute;touch-action:none}
#tbox b[data-e=n]{left:14px;right:14px;top:-8px;height:16px}
#tbox b[data-e=s]{left:14px;right:14px;bottom:-8px;height:16px}
#tbox b[data-e=w]{top:14px;bottom:14px;left:-8px;width:16px}
#tbox b[data-e=e]{top:14px;bottom:14px;right:-8px;width:16px}
#tpop{display:none;position:absolute;z-index:11;background:rgba(20,18,15,.92);color:#eee;font-size:13px}
#tpop span{padding:10px 14px;display:inline-block;cursor:pointer}
#tpop span:active{color:#fff}
#flash{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:30;background:rgba(20,18,15,.85);color:#eee;font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:8px 14px;opacity:0;transition:opacity .25s;pointer-events:none}
#bowlpane{background:var(--chrome);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.slip{width:min(70vw,300px);padding:16px 22px;font-size:16px;box-shadow:0 1px 2px rgba(0,0,0,.5),0 6px 16px rgba(0,0,0,.35);position:relative;cursor:pointer}
.slip small{display:block;margin-top:3px;font-size:11px;opacity:.65}
.slip:nth-child(odd){transform:rotate(-1.2deg)}
.slip:nth-child(even){transform:rotate(.9deg)}
.slip:active{transform:scale(.98)}
.slip[hidden]{display:none}
</style>
</head>
<body>
<div id="grid">
  <div class="pane" id="editpane">
    <div id="editwrap"><canvas id="main"></canvas><canvas id="live"></canvas></div>
    <img id="miniprev" alt="">
    <div id="tbox"><textarea id="tin" autocomplete="off"></textarea><i data-c="nw"></i><i data-c="ne"></i><i data-c="sw"></i><i data-c="se"></i><b data-e="n"></b><b data-e="e"></b><b data-e="s"></b><b data-e="w"></b><div id="tpop"><span data-tl="nl">→ nl</span><span data-tl="tr">→ tr</span><span data-tl="wikt">wikt</span></div></div>
    <div id="trbar"><span id="trdir">tr→nl</span><input id="trq" autocomplete="off" placeholder="translate"><span id="trres"></span></div>
    <div id="tools">
      <div class="dot on" id="cdot"><input type="color" id="color" value="#26221b"></div>
      <div class="dot on" id="pdot"></div>
      <div class="dot" id="mdot"></div>
      <div class="dot" id="edot"></div>
      <div class="dot" id="tdot">T</div>
    </div>
  </div>
  <div class="pane" id="practicepane">
    <div id="card"><img id="cardimg" alt=""><img id="lvldot" alt=""><div id="empty">the bowl is empty<br>swipe right to write</div></div>
  </div>
  <div class="pane" id="bowlpane">
    <div class="slip" id="emptyBowl">empty bowl<small id="bcount">0 cards</small></div>
    <div class="slip" id="exportBowl">export bowl<small>download json</small></div>
    <div class="slip" id="importBowl">import bowl<small>load partner json</small></div>
    <div class="slip" id="playOther" hidden>play imported bowl<small id="cother">0 cards</small></div>
    <div class="slip" data-level="easy">play easy bowl<small id="ceasy">0 cards</small></div>
    <div class="slip" data-level="medium">play medium bowl<small id="cmedium">0 cards</small></div>
    <div class="slip" data-level="difficult">play difficult bowl<small id="cdifficult">0 cards</small></div>
    <div class="slip" id="exitBowl" hidden>play all bowls<small>every card</small></div>
  </div>
</div>
<div id="holdmenu">
  <span data-act="easy">easy</span>
  <span data-act="medium">medium</span>
  <span data-act="difficult">difficult</span>
  <div class="sep"></div>
  <span data-act="edit">edit</span>
  <span data-act="delete">delete</span>
</div>
<div id="flash"></div>
<input type="file" id="fin" accept="application/json,.json" hidden>

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
document.addEventListener('contextmenu',e=>e.preventDefault());
const $=s=>document.querySelector(s);
const grid=$('#grid');
let mode=1;
function setMode(m){mode=m;grid.style.transform=`translateX(${-m*100}vw)`;if(m===0)fit()}
setMode(1);

function flash(t){const f=$('#flash');f.textContent=t;f.style.opacity=1;clearTimeout(f._t);f._t=setTimeout(()=>f.style.opacity=0,900)}

let db;
const dbReady=new Promise(res=>{
  const q=indexedDB.open('bowl',2);
  q.onupgradeneeded=()=>{
    const d=q.result;
    if(!d.objectStoreNames.contains('cards'))d.createObjectStore('cards',{keyPath:'id'});
    if(!d.objectStoreNames.contains('other'))d.createObjectStore('other',{keyPath:'id'});
  };
  q.onsuccess=()=>{db=q.result;res()};
});
const tx=(s='cards')=>db.transaction(s,'readwrite').objectStore(s);
const dbPut=c=>db&&tx().put(c);
const dbDel=id=>db&&tx().delete(id);
const dbClear=()=>db&&tx().clear();

const PAPERS=['#1fa055','#2f58b8','#f2d51e','#c536b0','#7a3fbf','#29b6c8','#8fd943','#e0342e','#f291be','#f28c1f','#1c8c74','#f0ede4'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const lum=h=>{const n=parseInt(h.slice(1),16);return(.299*(n>>16&255)+.587*(n>>8&255)+.114*(n&255))/255};
document.querySelectorAll('.slip').forEach(s=>{
  const p=rnd(PAPERS);
  s.style.background=p;
  s.style.color=lum(p)>.55?'#26221b':'#f4f0e6';
});

function genPaper(){return rnd(PAPERS)}
function genShape(){
  const pts=[],m=.05,cj=.015,ej=.008;
  const c=[[m,m],[1-m,m],[1-m,1-m],[m,1-m]].map(p=>[p[0]+(Math.random()-.5)*2*cj,p[1]+(Math.random()-.5)*2*cj]);
  for(let e=0;e<4;e++){
    const a=c[e],b=c[(e+1)%4];
    for(let s=0;s<3;s++){
      const t=s/3;
      pts.push([a[0]+(b[0]-a[0])*t+(s?(Math.random()-.5)*2*ej:0),a[1]+(b[1]-a[1])*t+(s?(Math.random()-.5)*2*ej:0)]);
    }
  }
  return pts;
}
function shapePath(c,mirror,w,h){
  c.beginPath();
  shape.forEach((p,i)=>{
    const x=(mirror?1-p[0]:p[0])*w,y=p[1]*h;
    i?c.lineTo(x,y):c.moveTo(x,y);
  });
  c.closePath();
}

const LVLC={easy:'#2c8c46',medium:'#2f58b8',difficult:'#c8342c'};
const lvlDots={};
function crayonDot(col){
  const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');
  x.fillStyle=col;
  for(let i=0;i<50;i++){
    const a=Math.random()*7,r=Math.random()*16;
    x.globalAlpha=.15+Math.random()*.35;
    x.beginPath();
    x.arc(32+Math.cos(a)*r,32+Math.sin(a)*r,4+Math.random()*5,0,7);
    x.fill();
  }
  x.globalCompositeOperation='destination-out';
  for(let i=0;i<300;i++){
    x.globalAlpha=Math.random()*.5;
    x.fillRect(Math.random()*64,Math.random()*64,1.5,1.5);
  }
  return c.toDataURL();
}
for(const l in LVLC)lvlDots[l]=crayonDot(LVLC[l]);

let cards=[],otherCards=[],playingOther=false,playFilter=null,rewriteTarget=null;
const lvl=c=>c.level||'medium';
const deck=()=>playingOther?otherCards:(playFilter?cards.filter(c=>lvl(c)===playFilter):cards);
function counts(){
  $('#bcount').textContent=cards.length+' cards';
  for(const l of['easy','medium','difficult'])
    $('#c'+l).textContent=cards.filter(c=>lvl(c)===l).length+' cards';
  $('#cother').textContent=otherCards.length+' cards';
  $('#playOther').hidden=!otherCards.length;
}

const cardimg=$('#cardimg'),lvldot=$('#lvldot');
let current=null,showing=0,hist=[],hp=-1;
function renderCard(){
  const d=deck();
  $('#empty').style.display=d.length?'none':'grid';
  cardimg.style.display=d.length?'':'none';
  lvldot.style.display=d.length?'':'none';
  if(current){
    cardimg.src=showing?current.back:current.front;
    lvldot.src=lvlDots[lvl(current)];
  }
}
function resetHist(){hist=[];hp=-1}
function loadEntry(){const e=hist[hp];current=e.c;showing=e.s;renderCard()}
function newCard(){
  const d=deck();if(!d.length){current=null;renderCard();return}
  const k=Math.min(Math.floor(d.length*.4),hist.length);
  const recent=hist.slice(-k).map(e=>e.c);
  let pool=d.filter(c=>!recent.includes(c)&&c!==current);
  if(!pool.length)pool=d.filter(c=>c!==current);
  if(!pool.length)pool=d;
  current=rnd(pool);showing=Math.random()<.5?1:0;
  hist.push({c:current,s:showing});
  if(hist.length>20)hist.shift();
  hp=hist.length-1;
  renderCard();
}
function nextCard(){hp<hist.length-1?(hp++,loadEntry()):newCard()}
function prevCard(){if(hp>0){hp--;loadEntry()}}
function flip(){if(!current)return;showing=1-showing;if(hist[hp])hist[hp].s=showing;renderCard()}

const pp=$('#practicepane'),hm=$('#holdmenu');
let g=null,menuOpen=false;
hm.addEventListener('pointerdown',e=>{
  e.stopPropagation();
  const act=e.target.dataset&&e.target.dataset.act;
  closeMenu();
  if(!act||!current)return;
  if(act==='delete')delCard();
  else if(act==='edit')editCard();
  else if(playingOther)flash('read only');
  else{current.level=act;dbPut(current);counts();renderCard();flash(act)}
});
function closeMenu(){menuOpen=false;hm.style.display='none'}
pp.addEventListener('pointerdown',e=>{
  if(menuOpen){closeMenu();return}
  pp.setPointerCapture(e.pointerId);
  g={x:e.clientX,y:e.clientY,t:Date.now(),timer:setTimeout(()=>{
    if(!current||!g)return;
    g.held=true;
    navigator.vibrate&&navigator.vibrate(15);
  },215)};
});
pp.addEventListener('pointermove',e=>{
  if(!g)return;
  if(Math.hypot(e.clientX-g.x,e.clientY-g.y)>12)clearTimeout(g.timer);
});
pp.addEventListener('pointerup',e=>{
  if(!g)return;clearTimeout(g.timer);
  const dx=e.clientX-g.x,dy=e.clientY-g.y,dt=Date.now()-g.t;
  if(g.held){
    menuOpen=true;
    hm.style.display='flex';
    hm.style.left=Math.min(g.x,innerWidth-160)+'px';
    hm.style.top=Math.min(g.y,innerHeight-240)+'px';
  }else if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx>0)setMode(0);else setMode(2);
  }else if(Math.abs(dy)>60&&Math.abs(dy)>Math.abs(dx)*1.5){
    dy<0?nextCard():prevCard();
  }else if(dt<260&&Math.hypot(dx,dy)<12){
    flip();
  }
  g=null;
});
function delCard(){
  if(!current)return;
  if(playingOther){flash('read only');return}
  const c=current;
  cards.splice(cards.indexOf(c),1);
  dbDel(c.id);
  hist=hist.filter(e=>e.c!==c);hp=hist.length-1;
  counts();flash('deleted');newCard();
}
function editCard(){
  if(!current)return;
  if(playingOther){flash('read only');return}
  rewriteTarget=current;
  sides=structuredClone(current.strokes||[[],[]]);
  cur=0;
  shape=current.shape||genShape();
  paper=current.paper||genPaper();
  setMode(0);
  repaint();updatePrev();
}

const mainC=$('#main'),liveC=$('#live');
const mx=mainC.getContext('2d'),lx=liveC.getContext('2d');
let dpr=1,W=0,H=0;
let sides=[[],[]],cur=0,shape=genShape(),paper=genPaper();
function fit(){
  const r=$('#editwrap').getBoundingClientRect();
  dpr=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;
  for(const c of[mainC,liveC])c.width=W*dpr,c.height=H*dpr;
  for(const c of[mx,lx])c.setTransform(dpr,0,0,dpr,0,0);
  repaint();updatePrev();
}
addEventListener('resize',()=>mode===0&&fit());

const noise=document.createElement('canvas');
noise.width=noise.height=128;
{
  const n=noise.getContext('2d'),id=n.createImageData(128,128);
  for(let i=0;i<id.data.length;i+=4){const v=Math.random();id.data[i+3]=v<.5?0:(v-.5)*220}
  n.putImageData(id,0,0);
}
const streak=document.createElement('canvas');
streak.width=streak.height=128;
{
  const s=streak.getContext('2d');
  s.fillStyle='#000';
  for(let i=0;i<70;i++){
    s.globalAlpha=.15+Math.random()*.5;
    s.fillRect(Math.random()*128,0,Math.random()<.8?1:2,128);
  }
}
const noisePat=lx.createPattern(noise,'repeat');
const streakPat=lx.createPattern(streak,'repeat');

let tool='pen',color='#26221b';
$('#color').oninput=e=>{color=e.target.value;$('#cdot').style.background=color};
const TOOLS={pen:'#pdot',mark:'#mdot',erase:'#edot'};
for(const t in TOOLS)$(TOOLS[t]).onclick=()=>setTool(t);
$('#tdot').onclick=()=>{if(!tEdit&&Date.now()-tCommitAt>400)openText(null)};
function setTool(t){tool=t;for(const k in TOOLS)$(TOOLS[k]).classList.toggle('on',k===t)}
setTool('pen');

function smoothPts(raw){
  const out=[[raw[0][0],raw[0][1]]];
  let px=raw[0][0],py=raw[0][1];
  for(let i=1;i<raw.length;i++){
    px+=(raw[i][0]-px)*.42;py+=(raw[i][1]-py)*.42;
    out.push([px,py]);
  }
  return out;
}
function strokeWidths(pts,base,vmin,vmax){
  const w=[];let pw=base;
  for(let i=0;i<pts.length;i++){
    const p=pts[i],q=pts[Math.max(0,i-1)];
    const v=Math.hypot(p[0]-q[0],p[1]-q[1]);
    pw+=(base*Math.max(vmin,Math.min(vmax,1.25-v*.03))-pw)*.3;
    w.push(pw);
  }
  return w;
}
function drawPen(c,pts,col){
  const sp=smoothPts(pts),ws=strokeWidths(sp,2.2,.55,1.25);
  c.fillStyle=col;
  for(let i=1;i<sp.length;i++){
    const[a,b]=[sp[i-1],sp[i]],w=ws[i];
    const d=Math.hypot(b[0]-a[0],b[1]-a[1]),steps=Math.max(1,Math.ceil(d/(w*.35)));
    for(let s=0;s<=steps;s++){
      const t=s/steps;
      c.globalAlpha=.75+Math.random()*.25;
      c.beginPath();
      c.arc(a[0]+(b[0]-a[0])*t+(Math.random()-.5)*.5,a[1]+(b[1]-a[1])*t+(Math.random()-.5)*.5,(w/2)*(.82+Math.random()*.36),0,7);
      c.fill();
    }
  }
  c.globalAlpha=1;
}
const TIP=Math.PI/4;
function drawMark(c,pts,col){
  const sp=smoothPts(pts),ws=strokeWidths(sp,26,.82,1.06);
  c.fillStyle=col;
  const stamp=(x,y,w)=>{
    c.save();c.translate(x,y);c.rotate(TIP);
    c.beginPath();c.ellipse(0,0,w/2,w*.22,0,0,7);c.fill();
    c.restore();
  };
  stamp(sp[0][0],sp[0][1],ws[0]);
  for(let i=1;i<sp.length;i++){
    const[a,b]=[sp[i-1],sp[i]],w=ws[i];
    const steps=Math.max(1,Math.ceil(Math.hypot(b[0]-a[0],b[1]-a[1])/1.6));
    for(let s=1;s<=steps;s++){
      const t=s/steps;
      stamp(a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,w);
    }
  }
}
function erode(c,pat,alpha,rot){
  c.save();
  c.globalCompositeOperation='destination-out';
  c.globalAlpha=alpha;
  if(rot){c.translate(W/2,H/2);c.rotate(rot);c.fillStyle=pat;c.fillRect(-W,-H,W*2,H*2)}
  else{c.fillStyle=pat;c.fillRect(0,0,W,H)}
  c.restore();
}
function paintStroke(c,s){
  if(s.tool==='text'){
    if(!s.rect)return;
    const x=s.rect[0]*W,y=s.rect[1]*H,w=s.rect[2]*W,h=s.rect[3]*H;
    c.save();
    c.beginPath();c.rect(x,y,w,h);c.clip();
    c.fillStyle=s.color;
    c.font='18px Arial';
    let ly=y+20;
    for(const para of s.text.split('\n')){
      let line='';
      for(const word of para.split(' ')){
        const t=line?line+' '+word:word;
        if(c.measureText(t).width>w-8&&line){c.fillText(line,x+4,ly);ly+=21.6;line=word}
        else line=t;
      }
      c.fillText(line,x+4,ly);ly+=21.6;
    }
    c.restore();
    erode(c,noisePat,.15);
    return;
  }
  const px=s.pts.map(p=>[p[0]*W,p[1]*H]);
  if(s.tool==='mark'){
    drawMark(c,px,s.color);
    erode(c,streakPat,.5,TIP);
    erode(c,noisePat,.35);
  }else{
    drawPen(c,px,s.color);
    erode(c,noisePat,.22);
  }
}
function commit(s){
  lx.clearRect(0,0,W,H);
  lx.save();
  shapePath(lx,cur===1,W,H);lx.clip();
  paintStroke(lx,s);
  lx.restore();
  mx.save();
  if(s.tool==='mark'){mx.globalCompositeOperation='multiply';mx.globalAlpha=.66}
  else mx.globalAlpha=.96;
  mx.drawImage(liveC,0,0,W,H);
  mx.restore();
  lx.clearRect(0,0,W,H);
}
function repaint(){
  mx.clearRect(0,0,W,H);lx.clearRect(0,0,W,H);
  mx.save();
  shapePath(mx,cur===1,W,H);mx.clip();
  mx.fillStyle=paper;mx.fillRect(0,0,W,H);
  mx.globalAlpha=.05;mx.fillStyle=noisePat;mx.fillRect(0,0,W,H);
  mx.restore();
  for(const s of sides[cur])if(s!==tHide)commit(s);
}

function hit(s,x,y){
  if(s.tool==='text')
    return x>s.rect[0]*W&&x<(s.rect[0]+s.rect[2])*W&&y>s.rect[1]*H&&y<(s.rect[1]+s.rect[3])*H;
  return s.pts.some(p=>Math.hypot(p[0]*W-x,p[1]*H-y)<20);
}
function eraseAt(x,y){
  const before=sides[cur].length;
  sides[cur]=sides[cur].filter(s=>s.tool==='text'||!hit(s,x,y));
  if(sides[cur].length!==before){repaint();updatePrev()}
}
const tbox=$('#tbox'),tin=$('#tin'),tpop=$('#tpop');
let tEdit=null,tSwallow=false,tHide=null;
function clampRect(r){
  r[2]=Math.max(60,Math.min(r[2],W-24));
  r[3]=Math.max(40,Math.min(r[3],H-24));
  r[0]=Math.max(12,Math.min(r[0],W-r[2]-12));
  r[1]=Math.max(12,Math.min(r[1],H-r[3]-12));
  return r;
}
function openText(ex){
  const r=ex?clampRect([ex.rect[0]*W,ex.rect[1]*H,ex.rect[2]*W,ex.rect[3]*H])
           :clampRect([W*.15,H*.35,W*.7,Math.min(H*.25,170)]);
  tEdit={ex,r};
  tHide=ex||null;
  tin.value=ex?ex.text:'';
  tin.style.color=ex?ex.color:color;
  tbox.style.display='block';
  placeBox();
  if(ex){repaint();updatePrev()}
}
function placeBox(){
  const r=tEdit.r;
  tbox.style.left=r[0]+'px';tbox.style.top=r[1]+'px';
  tbox.style.width=r[2]+'px';tbox.style.height=r[3]+'px';
}
tbox.querySelectorAll('i').forEach(hd=>{
  hd.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    hd.setPointerCapture(e.pointerId);
    const c=hd.dataset.c,r0=[...tEdit.r],x0=e.clientX,y0=e.clientY;
    const mv=ev=>{
      const dx=ev.clientX-x0,dy=ev.clientY-y0,r=tEdit.r;
      if(c.includes('w')){r[0]=r0[0]+dx;r[2]=r0[2]-dx}else r[2]=r0[2]+dx;
      if(c.includes('n')){r[1]=r0[1]+dy;r[3]=r0[3]-dy}else r[3]=r0[3]+dy;
      clampRect(r);placeBox();
    };
    const up=()=>{hd.removeEventListener('pointermove',mv);hd.removeEventListener('pointerup',up)};
    hd.addEventListener('pointermove',mv);
    hd.addEventListener('pointerup',up);
  });
});
tbox.querySelectorAll('b').forEach(ed=>{
  ed.addEventListener('pointerdown',e=>{
    e.stopPropagation();e.preventDefault();
    ed.setPointerCapture(e.pointerId);
    const r0=[...tEdit.r],x0=e.clientX,y0=e.clientY;
    const mv=ev=>{
      const r=tEdit.r;
      r[0]=r0[0]+ev.clientX-x0;r[1]=r0[1]+ev.clientY-y0;
      clampRect(r);placeBox();
    };
    const up=()=>{ed.removeEventListener('pointermove',mv);ed.removeEventListener('pointerup',up)};
    ed.addEventListener('pointermove',mv);
    ed.addEventListener('pointerup',up);
  });
});
function tCommit(){
  if(!tEdit)return;
  const{ex,r}=tEdit,v=tin.value.replace(/\s+$/,'');
  tEdit=null;tHide=null;tSwallow=true;
  tbox.style.display='none';tpop.style.display='none';tin.blur();
  const rect=[r[0]/W,r[1]/H,r[2]/W,r[3]/H];
  if(ex){
    if(!v)sides[cur]=sides[cur].filter(s=>s!==ex);
    else Object.assign(ex,{text:v,rect});
  }else if(v){
    sides[cur].push({tool:'text',rect,text:v,color});
  }
  setTool('pen');
  repaint();updatePrev();
}
let wTimer=null,wWord='';
tin.addEventListener('pointerdown',e=>{
  e.stopPropagation();
  tpop.style.display='none';
  const x0=e.clientX,y0=e.clientY;
  wTimer=setTimeout(()=>{
    const t=tin.value,i=tin.selectionStart;
    wWord=t.slice(tin.selectionStart,tin.selectionEnd).trim();
    if(!wWord){
      const re=/[\p{L}\p{M}'-]/u;
      let a=i,b=i;
      while(a>0&&re.test(t[a-1]))a--;
      while(b<t.length&&re.test(t[b]))b++;
      wWord=t.slice(a,b);
    }
    if(!wWord)wWord=t.trim();
    if(!wWord)return;
    tpop.style.left=Math.max(0,x0-tEdit.r[0]-60)+'px';
    tpop.style.top=(y0-tEdit.r[1]-56)+'px';
    tpop.style.display='block';
    navigator.vibrate&&navigator.vibrate(15);
  },500);
  const mv=ev=>{if(Math.hypot(ev.clientX-x0,ev.clientY-y0)>10)clearTimeout(wTimer)};
  const up=()=>{clearTimeout(wTimer);tin.removeEventListener('pointermove',mv);tin.removeEventListener('pointerup',up)};
  tin.addEventListener('pointermove',mv);
  tin.addEventListener('pointerup',up);
});
tpop.querySelectorAll('span').forEach(s=>s.addEventListener('pointerdown',e=>{
  e.stopPropagation();
  tpop.style.display='none';
  const u=s.dataset.tl==='wikt'
    ?`https://en.wiktionary.org/wiki/${encodeURIComponent(wWord.toLowerCase())}`
    :`https://translate.google.com/m?sl=auto&tl=${s.dataset.tl}&q=${encodeURIComponent(wWord)}`;
  window.open(u,'_blank');
}));
let tCommitAt=0;
document.addEventListener('pointerdown',e=>{
  if(tEdit&&!tbox.contains(e.target)){tCommitAt=Date.now();tCommit()}
},true);

function setLiveStyle(t){
  liveC.style.opacity=t==='mark'?.66:.96;
  liveC.style.mixBlendMode=t==='mark'?'multiply':'normal';
}
function clearLive(){liveC.style.opacity=1;liveC.style.mixBlendMode='normal';lx.clearRect(0,0,W,H)}
let st=null,edgeNav=null,lastEditTap=0,holdTimer=null;
liveC.addEventListener('pointerdown',e=>{
  liveC.setPointerCapture(e.pointerId);
  if(tSwallow){tSwallow=false;return}
  if(e.clientX<26||e.clientX>innerWidth-26){edgeNav={x:e.clientX};return}
  const now=Date.now();
  if(now-lastEditTap<300){
    lastEditTap=0;
    saveCard();
    return;
  }
  lastEditTap=now;
  const r=liveC.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  const tn=sides[cur].find(s=>s.tool==='text'&&hit(s,x,y));
  if(tn){openText(tn);return}
  if(tool==='erase'){st={erase:true};eraseAt(x,y);return}
  st={tool,color,pts:[[x/W,y/H]],cx:e.clientX,cy:e.clientY,t:now};
  setLiveStyle(tool);
  holdTimer=setTimeout(()=>{
    if(!st)return;
    st=null;clearLive();
    navigator.vibrate&&navigator.vibrate(25);
    if(!sides[0].length&&!sides[1].length){
      resetEdit();setMode(1);flash('cancelled');
    }else{
      sides=[[],[]];repaint();updatePrev();flash('reset');
    }
  },500);
});
liveC.addEventListener('pointermove',e=>{
  if(edgeNav||!st)return;
  const r=liveC.getBoundingClientRect();
  if(st.erase){eraseAt(e.clientX-r.left,e.clientY-r.top);return}
  if(Math.hypot(e.clientX-st.cx,e.clientY-st.cy)>10)clearTimeout(holdTimer);
  for(const ev of(e.getCoalescedEvents?e.getCoalescedEvents():[e]))st.pts.push([(ev.clientX-r.left)/W,(ev.clientY-r.top)/H]);
  lx.clearRect(0,0,W,H);
  lx.save();
  shapePath(lx,cur===1,W,H);lx.clip();
  paintStroke(lx,st);
  lx.restore();
});
liveC.addEventListener('pointerup',e=>{
  clearTimeout(holdTimer);
  if(edgeNav){
    if(e.clientX-edgeNav.x<-60)setMode(1);
    edgeNav=null;return;
  }
  if(!st)return;
  if(st.erase){st=null;return}
  const dx=e.clientX-st.cx,dy=e.clientY-st.cy,dt=Date.now()-st.t;
  const s=st;st=null;
  clearLive();
  if(dx<-100&&Math.abs(dy)<40&&dt<220){setMode(1);return}
  if(s.pts.length>1){sides[cur].push(s);commit(s);updatePrev()}
});

$('#miniprev').addEventListener('pointerdown',e=>{e.stopPropagation();flipSide()});

function resetEdit(){
  sides=[[],[]];cur=0;rewriteTarget=null;shape=genShape();paper=genPaper();
  repaint();updatePrev();
}
function flipSide(){cur=1-cur;repaint();updatePrev()}

function snapSide(side){
  const t=cur;cur=side;repaint();
  const out=document.createElement('canvas');
  out.width=mainC.width;out.height=mainC.height;
  out.getContext('2d').drawImage(mainC,0,0);
  cur=t;repaint();
  return out.toDataURL('image/png');
}
function updatePrev(){$('#miniprev').src=snapSide(1-cur)}
function saveCard(){
  if(!sides[0].length&&!sides[1].length){flash('empty card');return}
  const front=snapSide(0),back=snapSide(1),wasRewrite=!!rewriteTarget;
  const strokes=structuredClone(sides);
  let c;
  if(rewriteTarget){c=Object.assign(rewriteTarget,{front,back,shape,paper,strokes})}
  else{c={id:crypto.randomUUID(),front,back,shape,paper,strokes,level:'medium'};cards.push(c)}
  dbPut(c);
  counts();
  flash(wasRewrite?'rewritten':'saved');
  resetEdit();
  setMode(1);
  if(!current)newCard();else renderCard();
}

const bp=$('#bowlpane');
let bg=null;
bp.addEventListener('pointerdown',e=>{bg={x:e.clientX}});
bp.addEventListener('pointerup',e=>{
  if(!bg)return;
  if(e.clientX-bg.x>60)setMode(1);
  bg=null;
});
const eb=$('#emptyBowl');
let armed=false,armT=null;
eb.onclick=()=>{
  if(!armed){
    armed=true;
    eb.firstChild.textContent='are you sure?';
    armT=setTimeout(disarm,3000);
    return;
  }
  disarm();
  cards=[];playFilter=null;$('#exitBowl').hidden=true;
  dbClear();resetHist();counts();current=null;renderCard();
  flash('bowl emptied');
};
function disarm(){armed=false;clearTimeout(armT);eb.firstChild.textContent='empty bowl'}
$('#exportBowl').onclick=()=>{
  disarm();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(cards)],{type:'application/json'}));
  a.download='bowl.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
const fin=$('#fin');
$('#importBowl').onclick=()=>{disarm();fin.click()};
fin.onchange=()=>{
  const f=fin.files[0];fin.value='';
  if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const j=JSON.parse(rd.result);
      if(!Array.isArray(j))throw 0;
      otherCards=j;
      tx('other').clear();
      for(const c of otherCards){if(!c.id)c.id=crypto.randomUUID();tx('other').put(c)}
      counts();flash('imported');
    }catch{flash('invalid file')}
  };
  rd.readAsText(f);
};
$('#playOther').onclick=()=>{
  disarm();playingOther=true;playFilter=null;
  $('#exitBowl').hidden=false;
  flash('imported bowl');setMode(1);resetHist();newCard();
};
document.querySelectorAll('[data-level]').forEach(s=>s.onclick=()=>{
  disarm();
  playingOther=false;
  playFilter=s.dataset.level;
  $('#exitBowl').hidden=false;
  flash(playFilter+' bowl');setMode(1);resetHist();newCard();
});
$('#exitBowl').onclick=()=>{disarm();playingOther=false;playFilter=null;$('#exitBowl').hidden=true;flash('all cards');resetHist();newCard()};

const trq=$('#trq'),trres=$('#trres'),trdir=$('#trdir');
let trSl='tr',trTl='nl',trT=null;
trdir.onclick=()=>{[trSl,trTl]=[trTl,trSl];trdir.textContent=`${trSl}→${trTl}`;doTr()};
trq.addEventListener('input',()=>{clearTimeout(trT);trT=setTimeout(doTr,400)});
trq.addEventListener('pointerdown',e=>e.stopPropagation());
async function doTr(){
  const q=trq.value.trim();
  if(!q){trres.textContent='';return}
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${trSl}&tl=${trTl}&dt=t&q=${encodeURIComponent(q)}`);
    const j=await r.json();
    trres.textContent=j[0].map(x=>x[0]).join('');
  }catch{trres.textContent='?'}
}

dbReady.then(()=>{
  const q=tx().getAll();
  q.onsuccess=()=>{cards=q.result||[];counts();newCard()};
  const o=tx('other').getAll();
  o.onsuccess=()=>{otherCards=o.result||[];counts()};
});
counts();renderCard();
</script>
</body>
